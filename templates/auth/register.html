{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container">
  <div class="form-shell" style="padding:64px 0;">
    <div class="form-box">
      <h1 class="form-h">Регистрация</h1>
      <p class="form-sub">Создайте аккаунт</p>

      <form method="POST" action="{{ url_for('register') }}">
        <div class="field">
          <label class="field-lbl" for="username">Логин</label>
          <input type="text" id="username" name="username" class="field-input"
                 placeholder="мин. 3 символа" required minlength="3" autocomplete="username">
        </div>
        <div class="field">
          <label class="field-lbl" for="password">Пароль</label>
          <input type="password" id="password" name="password" class="field-input"
                 placeholder="мин. 6 символов" required minlength="6" autocomplete="new-password">
        </div>
        <div class="field">
          <label class="field-lbl" for="password2">Подтверждение</label>
          <input type="password" id="password2" name="password2" class="field-input"
                 placeholder="повторите пароль" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-white btn-block" style="margin-top:4px;">Создать</button>
      </form>

      <p class="form-footer">Есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
    </div>
  </div>
</div>
{% endblock %}
